<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MODO FOCO — Treino & Dieta</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#14171A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MODO FOCO">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14171A;
  --surface:#1B1F23;
  --surface-2:#23282D;
  --surface-3:#2A3036;
  --border:#2E353B;
  --text:#F3F4F1;
  --text-muted:#8F9AA1;
  --text-faint:#5C666C;
  --lime:#C8FF4D;
  --lime-dim:#8FB83A;
  --orange:#FF7A50;
  --orange-dim:#C75B3B;
  --danger:#FF5A5A;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}
::selection{background:var(--lime);color:#0A0C0D;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}
h1,h2,h3,.display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.02em;}
.mono{font-family:'JetBrains Mono',monospace;}

#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* ---- Chalk stripe signature divider ---- */
.chalk-divider{
  height:6px;
  width:100%;
  background:repeating-linear-gradient(
    -35deg,
    var(--stripe-color,var(--lime)) 0px,
    var(--stripe-color,var(--lime)) 8px,
    transparent 8px,
    transparent 16px
  );
  opacity:0.85;
}
.theme-diet .chalk-divider{--stripe-color:var(--orange);}

/* ---- Header ---- */
header.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
}
.back-btn{
  width:38px;height:38px;border-radius:10px;
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  transition:background .15s;
}
.back-btn:active{background:var(--surface-3);}
.topbar-title{
  font-size:20px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-sub{
  font-family:'Inter',sans-serif;
  text-transform:none;letter-spacing:0;
  font-size:12px;color:var(--text-muted);
  display:block;margin-top:1px;
}

/* ---- Main content ---- */
main{
  flex:1;
  padding:18px 16px 100px 16px;
  animation:fadeIn .22s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---- Bottom nav ---- */
nav.bottomnav{
  position:sticky;bottom:0;z-index:50;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom,0px)) 6px;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border-radius:12px;
  color:var(--text-faint);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;
  font-family:'Oswald',sans-serif;
  transition:color .15s, background .15s;
}
.nav-btn .ic{font-size:20px;}
.nav-btn.active{color:var(--text);background:var(--surface-2);}
.nav-btn.active.tab-treino{color:var(--lime);}
.nav-btn.active.tab-dieta{color:var(--orange);}

/* ---- Cards / generic ---- */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
}
.card-tap{transition:transform .1s, border-color .15s;}
.card-tap:active{transform:scale(0.98);}
.section-label{
  font-size:12px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin:22px 0 10px 0;font-weight:600;
}
.section-label:first-child{margin-top:0;}
.empty-state{
  text-align:center;padding:36px 18px;color:var(--text-muted);
  border:1.5px dashed var(--border);border-radius:var(--radius);
}
.empty-state .em-title{color:var(--text);font-weight:600;margin-bottom:4px;}
.empty-state .em-sub{font-size:13px;line-height:1.5;}

/* ---- Buttons ---- */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;border-radius:12px;
  font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;
  text-transform:uppercase;letter-spacing:.03em;
  transition:transform .1s, opacity .15s;
  width:100%;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--lime);color:#0A0C0D;}
.theme-diet .btn-primary{background:var(--orange);color:#1A0A05;}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:rgba(255,90,90,.12);color:var(--danger);border:1px solid rgba(255,90,90,.35);}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-block{margin-bottom:10px;}
.btn-sm{padding:9px 14px;font-size:12px;width:auto;}
.fab{
  position:fixed;bottom:88px;right:calc(50% - 260px + 18px);
  width:56px;height:56px;border-radius:50%;
  background:var(--lime);color:#0A0C0D;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;
  box-shadow:0 6px 18px rgba(0,0,0,.4);
  z-index:40;
}
.theme-diet .fab{background:var(--orange);color:#1A0A05;}
@media (max-width:560px){
  .fab{right:20px;}
}

/* ---- Day pills (plate style) ---- */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;}
.day-plate{
  aspect-ratio:1;border-radius:50%;
  background:var(--surface);
  border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;position:relative;
  transition:border-color .15s, transform .1s;
}
.day-plate:active{transform:scale(0.95);}
.day-plate .dow{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;}
.day-plate .cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);}
.day-plate.has-data{border-color:var(--lime);}
.theme-diet .day-plate.has-data{border-color:var(--orange);}

/* ---- Muscle badge ---- */
.badge{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;
  color:#0A0C0D;
}
.row{display:flex;align-items:center;gap:12px;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.flex1{flex:1;min-width:0;}
.title-sm{font-weight:600;font-size:15px;}
.sub-xs{font-size:12px;color:var(--text-muted);margin-top:2px;}
.chip{
  display:inline-flex;align-items:center;padding:4px 10px;border-radius:100px;
  font-size:11px;font-weight:600;background:var(--surface-2);color:var(--text-muted);
  border:1px solid var(--border);
}

/* ---- Forms ---- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em;}
.field input[type=text],.field input[type=number],.field input[type=time],.field select,.field textarea{
  width:100%;padding:13px 14px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);font-size:15px;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--lime);outline-offset:0;border-color:transparent;}
.theme-diet .field input:focus,.theme-diet .field select:focus{outline-color:var(--orange);}
.field-file{
  border:1.5px dashed var(--border);border-radius:10px;padding:16px;text-align:center;
  background:var(--surface-2);
}
.field-file input{display:none;}
.field-file .fl-label{font-size:13px;color:var(--text-muted);}
.field-file .fl-name{color:var(--lime);font-size:13px;margin-top:6px;word-break:break-all;}
.theme-diet .field-file .fl-name{color:var(--orange);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.seg button{flex:1;padding:11px 6px;font-size:12px;font-weight:600;background:var(--surface-2);color:var(--text-muted);}
.seg button.active{background:var(--lime);color:#0A0C0D;}
.theme-diet .seg button.active{background:var(--orange);color:#1A0A05;}

/* ---- List item with action ---- */
.list-item{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px;margin-bottom:10px;
}
.icon-btn{
  width:34px;height:34px;border-radius:9px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
}
.icon-btn:active{background:var(--surface-3);}
.icon-btn.danger{color:var(--danger);}

video,audio{width:100%;border-radius:10px;background:#000;display:block;}

.macro-bar{display:flex;height:8px;border-radius:6px;overflow:hidden;background:var(--surface-2);margin-top:8px;}
.macro-bar span{height:100%;}

.toast{
  position:fixed;left:50%;bottom:100px;transform:translateX(-50%);
  background:var(--surface-3);border:1px solid var(--border);
  padding:12px 18px;border-radius:100px;font-size:13px;font-weight:600;
  z-index:99;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
  max-width:88%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

.modal-overlay{
  position:fixed;inset:0;background:rgba(10,12,13,.7);
  display:flex;align-items:flex-end;justify-content:center;z-index:90;
  animation:fadeIn .15s ease;
}
.modal-sheet{
  width:100%;max-width:520px;background:var(--surface);
  border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0px)) 18px;
  max-height:82vh;overflow-y:auto;
  border-top:1px solid var(--border);
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px auto;}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px;}

.hint-box{
  background:var(--surface-2);border-left:3px solid var(--lime);
  border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--text-muted);line-height:1.55;margin-bottom:16px;
}
.theme-diet .hint-box{border-left-color:var(--orange);}

::-webkit-scrollbar{width:0;height:0;}
.app-footer{
  margin-top:40px;
  padding:24px 4px 8px 4px;
  text-align:center;
  border-top:1px solid var(--border);
}
.app-footer p{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text-faint);
  letter-spacing:.04em;
}
#authScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:24px;z-index:200;overflow-y:auto;
}
.auth-wrap{width:100%;max-width:380px;}
.auth-logo{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;
  letter-spacing:.03em;color:var(--lime);text-align:center;
}
.auth-sub{
  text-align:center;color:var(--text-muted);font-size:13px;
  text-transform:uppercase;letter-spacing:.08em;margin-top:2px;
}
.auth-error{
  color:var(--danger);font-size:13px;margin:-6px 0 14px 0;
  min-height:16px;
}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

	<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-logo">MODO FOCO</div>
    <div class="auth-sub">Treino & Dieta</div>

    <div class="seg" style="margin:24px 0 20px 0;">
      <button type="button" id="tabLoginBtn" class="active" onclick="showAuthTab('login')">Entrar</button>
      <button type="button" id="tabSignupBtn" onclick="showAuthTab('signup')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="field">

	</div>
	
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none;">←</button>
      <div class="flex1">
        <div class="topbar-title" id="pageTitle">MODO FOCO</div>

  <nav class="bottomnav">

      <span class="ic">🏋</span>Treino

</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   MODO FOCO — App de Treino & Dieta
   Armazenamento: em memória (dura enquanto a aba está aberta).
   Use "Início > Backup" para exportar/importar seus dados em um arquivo .json
   e não perder nada entre uma sessão e outra.
   ========================================================================= */

/* ---------------- Dados base ---------------- */
const DAYS = [
  {key:'dom', label:'Domingo', short:'DOM'},
  {key:'seg', label:'Segunda-feira', short:'SEG'},
  {key:'ter', label:'Terça-feira', short:'TER'},
  {key:'qua', label:'Quarta-feira', short:'QUA'},
  {key:'qui', label:'Quinta-feira', short:'QUI'},
  {key:'sex', label:'Sexta-feira', short:'SEX'},
  {key:'sab', label:'Sábado', short:'SAB'},
];

const MUSCLES = [
  {key:'peito', label:'Peito', color:'#FF7A50'},
  {key:'costas', label:'Costas', color:'#4DA1FF'},
  {key:'quadriceps', label:'Quadríceps', color:'#C8FF4D'},
  {key:'posterior', label:'Posterior de Coxa', color:'#9E7BFF'},
  {key:'panturrilha', label:'Panturrilha', color:'#FFD24D'},
  {key:'gluteos', label:'Glúteos', color:'#FF6FA3'},
  {key:'ombro', label:'Ombro', color:'#4DFFE0'},
  {key:'biceps', label:'Bíceps', color:'#FF9A4D'},
  {key:'triceps', label:'Tríceps', color:'#4DFF88'},
  {key:'antebraco', label:'Antebraço', color:'#C4C4C4'},
  {key:'abdomen', label:'Abdômen', color:'#FFE14D'},
  {key:'cardio', label:'Cardio', color:'#FF4D6A'},
];
function muscleInfo(key){return MUSCLES.find(m=>m.key===key) || {key, label:key, color:'#888'};}

const FOOD_CATEGORIES = [
  {key:'proteina', label:'Proteína', color:'#FF7A50'},
  {key:'carboidrato', label:'Carboidrato', color:'#C8FF4D'},
  {key:'gordura', label:'Gordura', color:'#FFD24D'},
  {key:'vegetal', label:'Vegetal', color:'#4DFF88'},
  {key:'fruta', label:'Fruta', color:'#FF6FA3'},
  {key:'laticinio', label:'Laticínio', color:'#4DA1FF'},
  {key:'outro', label:'Outro', color:'#C4C4C4'},
];
function catInfo(key){return FOOD_CATEGORIES.find(c=>c.key===key) || {key, label:key, color:'#888'};}

/* Biblioteca inicial de exercícios (sem vídeo — usuário pode anexar o dele) */
function seedExercises(){
  const presets = {
    peito:['Supino reto com barra','Supino inclinado com halteres','Crucifixo reto','Crossover na polia','Flexão de braço','Peck deck'],
    costas:['Puxada frente (pulley)','Remada curvada com barra','Remada baixa (cabo)','Barra fixa','Levantamento terra','Remada unilateral com halter'],
    quadriceps:['Agachamento livre','Leg press 45°','Cadeira extensora','Avanço (afundo)','Agachamento búlgaro'],
    posterior:['Mesa flexora','Stiff com barra','Cadeira flexora','Levantamento terra romeno'],
    panturrilha:['Panturrilha em pé','Panturrilha sentado','Panturrilha no leg press'],
    gluteos:['Elevação pélvica (hip thrust)','Cadeira abdutora','Agachamento sumô','Coice no cabo'],
    ombro:['Desenvolvimento com halteres','Elevação lateral','Elevação frontal','Remada alta','Desenvolvimento Arnold'],
    biceps:['Rosca direta com barra','Rosca alternada com halteres','Rosca scott','Rosca martelo'],
    triceps:['Tríceps pulley (corda)','Tríceps testa','Mergulho no banco','Tríceps francês'],
    antebraco:['Rosca de punho','Flexão de punho invertida','Farmer walk'],
    abdomen:['Abdominal reto','Prancha isométrica','Elevação de pernas','Abdominal oblíquo'],
    cardio:['Esteira (corrida/caminhada)','Bicicleta ergométrica','Pular corda','HIIT em circuito'],
  };
  const list = [];
  Object.keys(presets).forEach(muscle=>{
    presets[muscle].forEach(name=>{
      list.push({id:uid(), name, muscle, videoUrl:null, videoKind:null, custom:false});
    });
  });
  return list;
}

function seedFoods(){
  // valores aproximados por 100g
  return [
    {id:uid(), name:'Peito de frango grelhado', category:'proteina', protein:31, carbs:0, fat:3.6, custom:false},
    {id:uid(), name:'Arroz branco cozido', category:'carboidrato', protein:2.7, carbs:28, fat:0.3, custom:false},
    {id:uid(), name:'Feijão cozido', category:'carboidrato', protein:8.7, carbs:14, fat:0.5, custom:false},
    {id:uid(), name:'Batata doce cozida', category:'carboidrato', protein:1.6, carbs:20, fat:0.1, custom:false},
    {id:uid(), name:'Ovo cozido', category:'proteina', protein:13, carbs:1.1, fat:11, custom:false},
    {id:uid(), name:'Brócolis cozido', category:'vegetal', protein:2.8, carbs:7, fat:0.4, custom:false},
    {id:uid(), name:'Aveia em flocos', category:'carboidrato', protein:13.5, carbs:67, fat:7, custom:false},
    {id:uid(), name:'Azeite de oliva', category:'gordura', protein:0, carbs:0, fat:100, custom:false},

/* ---------------- Estado em memória ---------------- */
function emptyWeek(){
  const w = {};
  DAYS.forEach(d=>w[d.key]={muscles:[]}); // muscles: [{muscle, exercises:[{id, exerciseId}]}]
  return w;
}
function emptyDietWeek(){
  const w = {};
  DAYS.forEach(d=>w[d.key]={meals:[]}); // meals: [{id, name, time, notify, foods:[{id, foodId, name, grams, protein, carbs, fat, category}]}]
  return w;
}

};

function uid(){return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

/* ---------------- Router ---------------- */
let navStack = [{page:'home', params:{}}];
function current(){return navStack[navStack.length-1];}

function navigate(page, params={}, replace=false){
  if(replace){ navStack[navStack.length-1] = {page, params}; }
  else{ navStack.push({page, params}); }
  render();
  window.scrollTo(0,0);
}
function goBack(){
  if(navStack.length>1){ navStack.pop(); render(); window.scrollTo(0,0); }
  else{ navigate('home', {}, true); }
}
function goHomeTab(tabRoot){
  navStack = [{page:tabRoot, params:{}}];
  render();
}

/* ---------------- Toast ---------------- */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------------- Modal helper ---------------- */
function openModal(html){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      ${html}
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

/* ---------------- Confirm dialog ---------------- */
function confirmAction(title, msg, onYes){
  openModal(`
    <div class="modal-title">${title}</div>
    <p style="color:var(--text-muted);font-size:14px;line-height:1.5;margin-bottom:20px;">${msg}</p>
    <button class="btn btn-danger btn-block" id="confirmYes">Confirmar</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
  `);
  document.getElementById('confirmYes').onclick = ()=>{ closeModal(); onYes(); };
}

  const routes = {

    'food-library': renderFoodLibrary,

  };
  (routes[page] || renderHome)(main, params);
}

/* =========================================================================
   BACKUP (export/import JSON) — compensa a ausência de storage permanente
   ========================================================================= */
function renderBackup(main){
  setHeader('Backup','Exportar / importar dados');
  main.innerHTML = `
    <div class="hint-box">Isso salva treino, dieta e suas bibliotecas personalizadas em um arquivo .json no seu dispositivo. Vídeos anexados localmente não são incluídos no arquivo (só o link fica ativo durante a sessão).</div>
    <button class="btn btn-primary btn-block" onclick="exportData()">⬇ Exportar dados (.json)</button>
    <div class="field-file" style="margin-bottom:16px;" onclick="document.getElementById('importInput').click()">
      <div class="fl-label">⬆ Toque para importar um arquivo .json</div>
      <input type="file" id="importInput" accept="application/json" onchange="importData(event)">
    </div>
    <button class="btn btn-danger" onclick="confirmAction('Apagar tudo','Isso vai limpar todo o treino e dieta cadastrados nesta sessão. Essa ação não pode ser desfeita.', resetAll)">Apagar todos os dados</button>
  `;
}
function exportData(){
  const data = {
    workoutWeek: state.workoutWeek,
    dietWeek: state.dietWeek,
    exerciseLibrary: state.exerciseLibrary.map(e=>({...e, videoUrl:null})),
    foodLibrary: state.foodLibrary,
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'modofoco-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup exportado!');
}
function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(data.workoutWeek) state.workoutWeek = data.workoutWeek;
      if(data.dietWeek) state.dietWeek = data.dietWeek;
      if(data.exerciseLibrary) state.exerciseLibrary = data.exerciseLibrary;
      if(data.foodLibrary) state.foodLibrary = data.foodLibrary;
      showToast('Dados importados com sucesso!');
      navigate('home', {}, true);
    }catch(e){
      showToast('Arquivo inválido. Tente outro backup.');
    }
  };
  reader.readAsText(file);
}
function resetAll(){
  state.workoutWeek = emptyWeek();
  state.dietWeek = emptyDietWeek();
  showToast('Todos os dados foram apagados.');
  navigate('home', {}, true);
}

function saveNewExercise(day, muscle){

  const file = fileInput.files[0];

  const newEx = {
    id:uid(), name, muscle:selMuscle,
    videoUrl: file ? URL.createObjectURL(file) : null,
    videoKind: file ? (file.type.startsWith('audio')? 'audio':'video') : null,
    custom:true
  };
  state.exerciseLibrary.push(newEx);
  showToast('Exercício criado!');

  if(day && selMuscle){
    let mData = state.workoutWeek[day].muscles.find(m=>m.muscle===selMuscle);
    if(!mData){ mData = {muscle:selMuscle, exercises:[]}; state.workoutWeek[day].muscles.push(mData); }
    mData.exercises.push({id:uid(), exerciseId:newEx.id});
    navigate('workout-muscle',{day,muscle:selMuscle}, true);
  } else {
    navigate('library', {}, true);
  }
}

function removeMeal(day, mealId){
  confirmAction('Remover refeição','Isso remove a refeição e todos os alimentos dela.', ()=>{
    state.dietWeek[day].meals = state.dietWeek[day].meals.filter(m=>m.id!==mealId);
    showToast('Refeição removida.');
    render();
  });
}
function mealTotals(meal){
  return meal.foods.reduce((acc,f)=>{
    const factor = f.grams/100;
    acc.protein += f.protein*factor;
    acc.carbs += f.carbs*factor;
    acc.fat += f.fat*factor;
    acc.kcal += (f.protein*factor*4)+(f.carbs*factor*4)+(f.fat*factor*9);
    return acc;
  },{protein:0,carbs:0,fat:0,kcal:0});
}

        <div class="sub-xs">${s.day} · ${s.time}</div>
      </div>
    </div>`).join('')}
  `;
}

function ensureNotifPermission(showFeedback){
  if(typeof Notification==='undefined'){
    if(showFeedback) showToast('Este navegador não suporta notificações.');
    return;
  }
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{
      state.notifPermission = p;
      if(showFeedback) showToast(p==='granted' ? 'Notificações ativadas!' : 'Permissão não concedida.');
      render();
    });
  } else if(showFeedback){
    showToast(Notification.permission==='granted' ? 'Notificações já ativadas.' : 'Notificações bloqueadas nas configurações do navegador.');
  }
}

/* Checa a cada 20s se algum horário de refeição bateu com o horário atual */
function checkMealNotifications(){
  if(typeof Notification==='undefined' || Notification.permission!=='granted') return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const nowStr = `${hh}:${mm}`;
  const dowIndex = now.getDay(); // 0=domingo
  const dayKey = DAYS[dowIndex].key;

  const meals = state.dietWeek[dayKey].meals;
  meals.forEach(meal=>{
    if(meal.notify && meal.time===nowStr){
      const flagKey = dayKey+'-'+meal.id+'-'+nowStr;
      if(!state.firedThisMinute[flagKey]){
        state.firedThisMinute[flagKey] = true;
        try{
          new Notification('Hora da refeição: '+meal.name, {
            body: 'Está na hora de '+meal.name.toLowerCase()+' ('+meal.time+').',
            tag: flagKey,
          });
        }catch(e){}
      }
    }
  });
  // limpa flags antigas de vez em quando
  if(Object.keys(state.firedThisMinute).length>200) state.firedThisMinute = {};
}
setInterval(checkMealNotifications, 20000);

/* ---------------- AUTENTICAÇÃO ---------------- */
function showAuthTab(tab){
  document.getElementById('tabLoginBtn').classList.toggle('active', tab==='login');
  document.getElementById('tabSignupBtn').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block' : 'none';
}

function traduzErroFirebase(err){
  const map = {
    'auth/email-already-in-use':'Já existe uma conta com esse e-mail.',
    'auth/invalid-email':'Digite um e-mail válido.',
    'auth/weak-password':'A senha precisa ter no mínimo 6 caracteres.',
    'auth/user-not-found':'E-mail ou senha incorretos.',
    'auth/wrong-password':'E-mail ou senha incorretos.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde um pouco e tente de novo.',
    'auth/network-request-failed':'Sem conexão com a internet. Verifique sua rede.',
  };
  return map[err.code] || ('Erro: ' + err.message);
}

function doSignup(){
  const nome = document.getElementById('suNome').value.trim();
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const telefone = document.getElementById('suTelefone').value.trim();
  const nascimento = document.getElementById('suNascimento').value;
  const senha = document.getElementById('suSenha').value;
  const senha2 = document.getElementById('suSenha2').value;
  const errBox = document.getElementById('signupError');
  errBox.textContent = '';

  if(!nome || !email || !telefone || !nascimento || !senha){ errBox.textContent='Preencha todos os campos.'; return; }
  if(!email.includes('@') || !email.includes('.')){ errBox.textContent='Digite um e-mail válido.'; return; }
  if(senha.length < 6){ errBox.textContent='A senha precisa ter no mínimo 6 caracteres.'; return; }
  if(senha !== senha2){ errBox.textContent='As senhas não coincidem.'; return; }

  const btn = document.querySelector('#signupForm .btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = 'Criando conta...'; }

  auth.createUserWithEmailAndPassword(email, senha)
    .then((cred)=>{
      return db.collection('modofoco-users').doc(cred.user.uid).set({
        nome, email, telefone, nascimento,
        workoutWeek: state.workoutWeek,
        dietWeek: state.dietWeek,
        exerciseLibrary: state.exerciseLibrary.map(e=>({...e, videoUrl:null, videoKind:null})),
        foodLibrary: state.foodLibrary,
      });
    })
    .then(()=> enterApp())
    .catch((err)=>{
      errBox.textContent = traduzErroFirebase(err);
      if(btn){ btn.disabled = false; btn.textContent = 'Criar conta'; }
    });
}

function doLogin(){
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const senha = document.getElementById('loginSenha').value;
  const errBox = document.getElementById('loginError');
  errBox.textContent = '';

  const btn = document.querySelector('#loginForm .btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = 'Entrando...'; }

  auth.signInWithEmailAndPassword(email, senha)
    .then(()=> enterApp())
    .catch((err)=>{
      errBox.textContent = traduzErroFirebase(err);
      if(btn){ btn.disabled = false; btn.textContent = 'Entrar'; }
    });
}

function logout(){
  saveToStorage().finally(()=>{
    auth.signOut().then(()=> location.reload());
  });
}

async function enterApp(){
  await loadFromStorage();
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

/* ---------------- INIT (login primeiro) ---------------- */
document.getElementById('app').style.display='none';
auth.onAuthStateChanged((user)=>{
  if(user){
    enterApp();
  } else {
    document.getElementById('authScreen').style.display='flex';
  }
});

function saveToStorage(){
  const user = auth.currentUser;
  const data = {
    workoutWeek: state.workoutWeek,
    dietWeek: state.dietWeek,
    exerciseLibrary: state.exerciseLibrary.map(e=>({...e, videoUrl:null, videoKind:null})),
    foodLibrary: state.foodLibrary,
  };
  if(!user){
    try{ localStorage.setItem('modofoco-data-convidado', JSON.stringify(data)); }catch(e){}
    return Promise.resolve();
  }
  return db.collection('modofoco-users').doc(user.uid).set(data, {merge:true})
    .catch((e)=>{
      // sem internet: o Firestore guarda em fila local e sincroniza sozinho depois
      console.warn('saveToStorage: será sincronizado quando voltar a conexão', e);
    });
}

async function loadFromStorage(){
  const user = auth.currentUser;
  if(!user) return;
  try{
    const doc = await db.collection('modofoco-users').doc(user.uid).get();
    if(doc.exists){
      const data = doc.data();
      if(data.workoutWeek) state.workoutWeek = data.workoutWeek;
      if(data.dietWeek) state.dietWeek = data.dietWeek;
      if(data.exerciseLibrary) state.exerciseLibrary = data.exerciseLibrary;
      if(data.foodLibrary) state.foodLibrary = data.foodLibrary;
    }
  }catch(e){
    console.warn('loadFromStorage: usando cache local se disponível', e);
  }
}
